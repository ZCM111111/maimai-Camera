name: MaimaiBridge

options:
  bundleIdPrefix: com.maimai
  deploymentTarget: {iOS: "17.0"}
  xcodeVersion: "16.2"
  developmentLanguage: zh-Hans

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  MaimaiBridge:
    type: application
    platform: iOS
    sources:
      - path: MaimaiBridgeApp.swift
      - path: Services
      - path: ViewModels
      - path: Views
      - path: Resources
      - path: Info.plist
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.maimai.bridge
        PRODUCT_NAME: "MaimaiBridge"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_PREVIEWS: "NO"
        INFOPLIST_KEY_NSCameraUsageDescription: "用于采集视频流传输到PC"
        INFOPLIST_KEY_NSMotionUsageDescription: "用于采集陀螺仪数据传输到PC"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "用于在局域网内传输视频流到PC"
